<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Luís Tieres | Portfólio</title>
    <link rel="stylesheet" href="/portfolio/css/style.css">
    <script src="/portfolio/js/script.js" defer></script>
    <script src="/portfolio/js/load.js" defer></script>
    <meta property="og:title" content="Luis Tieres - Portfolio" />
    <meta property="og:description" content="Backend Developer | Systems Student | Marathon Runner" />
    <meta property="og:image" content="https://luistieres.github.io/portfolio/assets/img/logo_luis.png" />

    <meta property="og:type" content="website" />

<body>

    <dialog id="language-dialog">
        <h2>Choose your language / Escolha seu idioma</h2>
        
        <div class="lang-options">
            <button onclick="setLanguage('en')">🇺🇸 English</button>
            <button onclick="setLanguage('pt')">🇧🇷 Português</button>
        </div>
    </dialog>

    <audio id="background-music" autoplay loop>
        <source src="/portfolio/assets/audio/musicafundo.mp3" type="audio/mpeg">
    </audio>

    <div id="header"></div>

    <main>
        <div id="content"></div>
        <button id="download-cv" class="download-cv">Download CV</button>
    </main>

    <div id="footer"></div>

</body>
</html>

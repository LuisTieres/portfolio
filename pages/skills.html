<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Luis Tieres | Portfólio</title>
    <link rel="stylesheet" href="/portfolio/css/style.css">
</head>

<body>

    <div id="header"></div>
    <main>

        <section id="idiomas-skills" class="idiomas-skills">
            <h1 class="section-title" data-i18n="languages_skills">
                Skills
            </h1>
            <div class="idiomas-skills-content">
                <div class="idiomas">
                    <h2 data-i18n="languages_title">Languages</h2>

                    <div class="idiomas-container">
                        <div class="idioma-card">
                            <h3 data-i18n="lang_en">English</h3>
                            <span class="nivel">B2</span>
                        </div>

                        <div class="idioma-card">
                            <h3 data-i18n="lang_fi">Finnish</h3>
                            <span class="nivel">A1</span>
                        </div>

                        <div class="idioma-card">
                            <h3 data-i18n="lang_fi">German</h3>
                            <span class="nivel">A1</span>
                        </div>
                    </div>
                </div>

                <div class="skills">
                    <h2 data-i18n="habilidades">Skills</h2>

                    <div class="skills-container">
                        <!-- Linguagens de programação -->
                        <div class="skill-group">
                            <h3>Languages</h3>
                            <span class="skill">C</span>
                            <span class="skill">C++</span>
                            <span class="skill">Python</span>
                            <span class="skill">TypeScript</span>
                            <span class="skill">Java</span>
                        </div>

                        <!-- Frameworks / Tecnologias -->
                        <div class="skill-group">
                            <h3>Frameworks / Tools</h3>
                            <span class="skill">PyQt6</span>
                            <span class="skill">Spring Boot</span>
                            <span class="skill">REST API</span>
                            <span class="skill">React</span>
                            <span class="skill">Git</span>
                            <span class="skill">Linux</span>
                        </div>

                        <!-- Bancos de dados -->
                        <div class="skill-group">
                            <h3>Databases</h3>
                            <span class="skill">MySQL</span>
                            <span class="skill">PostgreSQL</span>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div id="footer"></div>

    <script src="/portfolio/js/load.js"></script>
</body>
</html>
